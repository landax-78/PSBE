<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760">
  <defs>
    <style>
      .box{fill:#ffffff;stroke:#2563eb;stroke-width:2;rx:12;filter:url(#shadow)}
      .head{fill:#2563eb;rx:12}
      .title{fill:#fff;font-family:Arial, sans-serif;font-size:18px;font-weight:bold}
      .text{fill:#0f172a;font-family:Arial, sans-serif;font-size:14px}
      .pk{fill:#dc2626;font-weight:bold}
      .fk{fill:#7c3aed;font-weight:bold}
      .rel{stroke:#0f172a;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .label{fill:#0f172a;font-family:Arial, sans-serif;font-size:13px;font-weight:bold}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#0f172a" />
    </marker>
  </defs>
  <rect width="1180" height="760" fill="#f4f7fb"/>
  <text x="590" y="38" text-anchor="middle" font-family="Arial" font-size="26" font-weight="bold" fill="#0f172a">ERD Sistem Informasi Laundry CleanWash</text>

  <g transform="translate(70,95)">
    <rect class="box" width="260" height="210"/>
    <rect class="head" width="260" height="42"/>
    <text class="title" x="18" y="27">users</text>
    <text class="text pk" x="18" y="70">PK id</text>
    <text class="text" x="18" y="94">username (UNIQUE)</text>
    <text class="text" x="18" y="118">email (UNIQUE)</text>
    <text class="text" x="18" y="142">password</text>
    <text class="text" x="18" y="166">role: admin/pelanggan</text>
    <text class="text" x="18" y="190">created_at, updated_at</text>
  </g>

  <g transform="translate(455,95)">
    <rect class="box" width="260" height="200"/>
    <rect class="head" width="260" height="42"/>
    <text class="title" x="18" y="27">pelanggan</text>
    <text class="text pk" x="18" y="70">PK id</text>
    <text class="text fk" x="18" y="94">FK user_id (UNIQUE)</text>
    <text class="text" x="18" y="118">nama</text>
    <text class="text" x="18" y="142">no_hp</text>
    <text class="text" x="18" y="166">alamat</text>
    <text class="text" x="18" y="190">created_at, updated_at</text>
  </g>

  <g transform="translate(850,95)">
    <rect class="box" width="260" height="220"/>
    <rect class="head" width="260" height="42"/>
    <text class="title" x="18" y="27">transaksi</text>
    <text class="text pk" x="18" y="70">PK id</text>
    <text class="text" x="18" y="94">kode_transaksi (UNIQUE)</text>
    <text class="text fk" x="18" y="118">FK pelanggan_id</text>
    <text class="text" x="18" y="142">tanggal_masuk</text>
    <text class="text" x="18" y="166">tanggal_selesai_est</text>
    <text class="text" x="18" y="190">status</text>
    <text class="text" x="18" y="214">total_harga</text>
  </g>

  <g transform="translate(850,460)">
    <rect class="box" width="260" height="210"/>
    <rect class="head" width="260" height="42"/>
    <text class="title" x="18" y="27">detail_transaksi</text>
    <text class="text pk" x="18" y="70">PK id</text>
    <text class="text fk" x="18" y="94">FK transaksi_id</text>
    <text class="text fk" x="18" y="118">FK layanan_id</text>
    <text class="text" x="18" y="142">berat</text>
    <text class="text" x="18" y="166">harga</text>
    <text class="text" x="18" y="190">subtotal</text>
  </g>

  <g transform="translate(455,470)">
    <rect class="box" width="260" height="200"/>
    <rect class="head" width="260" height="42"/>
    <text class="title" x="18" y="27">layanan</text>
    <text class="text pk" x="18" y="70">PK id</text>
    <text class="text" x="18" y="94">nama_layanan</text>
    <text class="text" x="18" y="118">satuan</text>
    <text class="text" x="18" y="142">harga</text>
    <text class="text" x="18" y="166">estimasi_hari</text>
    <text class="text" x="18" y="190">status</text>
  </g>

  <path class="rel" d="M330,195 C380,195 405,195 455,195"/>
  <text class="label" x="360" y="180">1 : 1</text>

  <path class="rel" d="M715,195 C765,195 800,195 850,195"/>
  <text class="label" x="760" y="180">1 : N</text>

  <path class="rel" d="M980,315 C980,375 980,400 980,460"/>
  <text class="label" x="995" y="390">1 : N</text>

  <path class="rel" d="M715,570 C765,570 800,570 850,570"/>
  <text class="label" x="760" y="555">1 : N</text>
</svg>
